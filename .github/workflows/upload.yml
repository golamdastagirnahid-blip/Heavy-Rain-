name: Rain Sleep Daily Upload

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 12 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          echo "✅ FFmpeg: $(ffmpeg -version | head -1)"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Dependencies ready"

      - name: Create Credentials
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' \
            > client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' \
            > token.json
          echo "✅ Credentials ready"

      - name: Setup Database
        run: |
          if [ ! -f database.json ]; then
            echo '{
              "uploaded_videos": [],
              "daily_counts": {},
              "statistics": {"total_uploads": 0}
            }' > database.json
            echo "✅ Database created"
          else
            echo "✅ Database exists"
          fi

      - name: Cache Audio Files
        uses: actions/cache@v4
        with:
          path: downloads/audio/
          key: audio-cache-v1
          restore-keys: |
            audio-cache-v1

      - name: Run Bot
        run: python main.py
        env:
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:    ${{ secrets.PIXABAY_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Save State and Database
        if: always()
        run: |
          git config user.name  "automation-bot"
          git config user.email "bot@github.com"
          git add database.json
          git add state.json 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "Update DB [skip ci]"
          git push || true

      - name: Cleanup
        if: always()
        run: |
          rm -rf downloads/footage/ || true
          rm -rf output/            || true
          rm -rf thumbnails/        || true
          rm -f  token.json         || true
          rm -f  client_secrets.json || true
          echo "✅ Cleanup done"
